<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MMA DNA — Pulse — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0e0e12;
    --surface: #1a1a22;
    --surface-2: #24242e;
    --red: #ef4444;
    --blue: #3b82f6;
    --green: #22c55e;
    --text: #f5f5f7;
    --text-2: #9898a8;
    --text-3: #5a5a6e;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* Concept label */
  .concept-label {
    position: fixed;
    top: 12px;
    right: 14px;
    font-size: 10px;
    color: var(--text-3);
    font-family: 'Inter', sans-serif;
    z-index: 100;
    letter-spacing: .3px;
  }
  .concept-label strong { color: var(--text-2); }

  /* Page wrapper */
  .login-page {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    padding: 32px 24px 40px;
  }

  /* ---- LOGO ---- */
  .logo-block {
    text-align: center;
    margin-bottom: 48px;
    position: relative;
  }

  .logo-ring {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    border: 3px solid var(--red);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 18px;
    position: relative;
    animation: pulse-ring 2.4s ease-in-out infinite;
  }
  .logo-ring::after {
    content: '';
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 1.5px solid rgba(239, 68, 68, .25);
    animation: pulse-outer 2.4s ease-in-out infinite;
  }

  @keyframes pulse-ring {
    0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,.45); }
    50% { box-shadow: 0 0 24px 6px rgba(239,68,68,.18); }
  }
  @keyframes pulse-outer {
    0%, 100% { transform: scale(1); opacity: .6; }
    50% { transform: scale(1.12); opacity: 0; }
  }

  .logo-icon {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 28px;
    letter-spacing: 1px;
    color: var(--text);
    line-height: 1;
  }
  .logo-icon span { color: var(--red); }

  .app-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 36px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--text);
  }
  .app-subtitle {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--red);
    margin-top: 4px;
  }

  /* ---- FORM ---- */
  .login-form {
    width: 100%;
    max-width: 380px;
  }

  .input-group {
    margin-bottom: 14px;
  }
  .input-group label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-2);
    text-transform: uppercase;
    letter-spacing: .8px;
    margin-bottom: 6px;
  }
  .input-group input {
    width: 100%;
    padding: 14px 16px;
    background: var(--surface);
    border: 1.5px solid var(--surface-2);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .input-group input::placeholder { color: var(--text-3); }
  .input-group input:focus {
    border-color: var(--red);
    box-shadow: 0 0 0 3px rgba(239,68,68,.12);
  }

  .forgot-link {
    display: block;
    text-align: right;
    font-size: 12px;
    color: var(--text-3);
    margin-top: -6px;
    margin-bottom: 20px;
    text-decoration: none;
    transition: color .15s;
  }
  .forgot-link:hover { color: var(--red); }

  /* Primary button */
  .btn-primary {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--red), #dc2626);
    color: #fff;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform .12s, box-shadow .2s;
    box-shadow: 0 4px 20px rgba(239,68,68,.25);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(239,68,68,.35); }
  .btn-primary:active { transform: scale(.98); }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 14px;
    margin: 26px 0;
  }
  .divider span {
    font-size: 11px;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: .6px;
    white-space: nowrap;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--surface-2);
  }

  /* Social buttons */
  .social-row {
    display: flex;
    gap: 12px;
    margin-bottom: 14px;
  }
  .btn-social {
    flex: 1;
    padding: 13px;
    background: var(--surface);
    border: 1.5px solid var(--surface-2);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: border-color .15s, background .15s;
  }
  .btn-social:hover { border-color: var(--text-3); background: var(--surface-2); }
  .btn-social svg { width: 18px; height: 18px; flex-shrink: 0; }

  /* Guest button */
  .btn-guest {
    width: 100%;
    padding: 14px;
    background: transparent;
    border: 1.5px dashed var(--surface-2);
    border-radius: 10px;
    color: var(--text-2);
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 13px;
    cursor: pointer;
    transition: border-color .15s, color .15s;
  }
  .btn-guest:hover { border-color: var(--text-3); color: var(--text); }

  /* Footer */
  .login-footer {
    margin-top: 36px;
    text-align: center;
    font-size: 13px;
    color: var(--text-3);
  }
  .login-footer a {
    color: var(--red);
    text-decoration: none;
    font-weight: 600;
  }
  .login-footer a:hover { text-decoration: underline; }

  /* Background decoration */
  .bg-glow {
    position: fixed;
    width: 420px;
    height: 420px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(239,68,68,.06) 0%, transparent 70%);
    top: -80px;
    left: 50%;
    transform: translateX(-50%);
    pointer-events: none;
    z-index: 0;
  }
  .login-page { position: relative; z-index: 1; }
</style>
</head>
<body>

<div class="bg-glow"></div>
<div class="concept-label"><strong>D &mdash; Pulse</strong> &middot; Login</div>

<div class="login-page">

  <!-- Logo -->
  <div class="logo-block">
    <div class="logo-ring">
      <div class="logo-icon">M<span>D</span>NA</div>
    </div>
    <div class="app-title">MMA DNA</div>
    <div class="app-subtitle">Pulse</div>
  </div>

  <!-- Form -->
  <form class="login-form" onsubmit="return false">
    <div class="input-group">
      <label>Email</label>
      <input type="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="input-group">
      <label>Password</label>
      <input type="password" placeholder="Enter your password" autocomplete="current-password">
    </div>
    <a href="#" class="forgot-link">Forgot password?</a>

    <button class="btn-primary" type="submit">Sign In</button>

    <div class="divider"><span>or continue with</span></div>

    <div class="social-row">
      <button class="btn-social" type="button">
        <svg viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1Z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23Z" fill="#34A853"/><path d="M5.84 14.09A6.68 6.68 0 0 1 5.5 12c0-.72.13-1.43.34-2.09V7.07H2.18A10.96 10.96 0 0 0 1 12c0 1.78.43 3.46 1.18 4.93l3.66-2.84Z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53Z" fill="#EA4335"/></svg>
        Google
      </button>
      <button class="btn-social" type="button">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
        GitHub
      </button>
    </div>

    <button class="btn-guest" type="button">Continue as Guest</button>
  </form>

  <div class="login-footer">
    Don't have an account? <a href="#">Sign up free</a>
  </div>

</div>
</body>
</html>
