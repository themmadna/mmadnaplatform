<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MMA DNA — Editorial — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #12110f;
    --surface: #1c1a17;
    --border: rgba(255,255,255,0.06);
    --text: #ede8e0;
    --text-2: #a09888;
    --text-3: #605848;
    --warm: #c8956c;
    --warm-soft: rgba(200,149,108,0.15);
    --cream: #f5ead6;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Source Sans 3', Georgia, serif;
    -webkit-font-smoothing: antialiased;
    -webkit-text-size-adjust: 100%;
    -webkit-tap-highlight-color: transparent;
  }

  /* Concept label */
  .concept-label {
    position: fixed;
    top: 12px;
    right: 14px;
    background: rgba(18,17,15,0.9);
    backdrop-filter: blur(12px);
    padding: 6px 12px;
    border-radius: 100px;
    font-size: 10px;
    font-weight: 600;
    color: var(--text-3);
    z-index: 100;
    border: 1px solid var(--border);
  }
  .concept-label strong { color: var(--warm); }

  /* Page wrapper */
  .login-page {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    min-height: 100dvh;
    padding: 32px 24px 40px;
    position: relative;
    z-index: 1;
  }

  /* ---- BACKGROUND TEXTURE ---- */
  .bg-texture {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
    background:
      radial-gradient(ellipse 600px 500px at 50% 20%, rgba(200,149,108,0.06) 0%, transparent 70%);
  }

  /* ---- LOGO BLOCK ---- */
  .logo-block {
    text-align: center;
    margin-bottom: 52px;
  }

  .logo-monogram {
    width: 80px;
    height: 80px;
    margin: 0 auto 20px;
    border: 2px solid var(--warm);
    border-radius: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .logo-monogram::before {
    content: '';
    position: absolute;
    inset: 4px;
    border: 1px solid rgba(200,149,108,0.25);
  }
  .logo-letter {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 32px;
    color: var(--cream);
    letter-spacing: -1px;
  }
  .logo-letter span {
    color: var(--warm);
    font-style: italic;
  }

  .app-title {
    font-family: 'Playfair Display', serif;
    font-weight: 800;
    font-size: 32px;
    letter-spacing: -0.5px;
    color: var(--cream);
  }
  .app-title em {
    font-style: italic;
    color: var(--warm);
  }
  .app-subtitle {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 5px;
    color: var(--text-3);
    margin-top: 6px;
    font-weight: 600;
  }

  /* ---- FORM ---- */
  .login-form {
    width: 100%;
    max-width: 360px;
  }

  .input-group {
    margin-bottom: 16px;
  }
  .input-group label {
    display: block;
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    font-style: italic;
    color: var(--text-2);
    margin-bottom: 8px;
  }
  .input-group input {
    width: 100%;
    padding: 14px 16px;
    background: transparent;
    border: none;
    border-bottom: 1.5px solid var(--text-3);
    color: var(--text);
    font-family: 'Source Sans 3', serif;
    font-size: 15px;
    outline: none;
    border-radius: 0;
    transition: border-color .25s;
  }
  .input-group input::placeholder { color: var(--text-3); }
  .input-group input:focus {
    border-bottom-color: var(--warm);
  }

  .forgot-link {
    display: block;
    text-align: right;
    font-family: 'Playfair Display', serif;
    font-size: 12px;
    font-style: italic;
    color: var(--text-3);
    margin-top: -8px;
    margin-bottom: 28px;
    text-decoration: none;
    transition: color .2s;
  }
  .forgot-link:hover { color: var(--warm); }

  /* Primary button — editorial style: rectangular, copper */
  .btn-primary {
    width: 100%;
    padding: 16px;
    border: none;
    background: var(--warm);
    color: var(--bg);
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: background .2s, transform .12s;
  }
  .btn-primary:hover { background: #d4a47c; transform: translateY(-1px); }
  .btn-primary:active { transform: scale(0.99); }

  /* Section rule divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 14px;
    margin: 28px 0;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .divider-text {
    font-family: 'Playfair Display', serif;
    font-size: 11px;
    font-style: italic;
    color: var(--text-3);
    letter-spacing: 1px;
    text-transform: lowercase;
  }

  /* Social buttons */
  .social-row {
    display: flex;
    gap: 12px;
    margin-bottom: 14px;
  }
  .btn-social {
    flex: 1;
    padding: 13px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-2);
    font-family: 'Source Sans 3', serif;
    font-weight: 500;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: border-color .2s, color .2s;
  }
  .btn-social:hover { border-color: var(--warm); color: var(--cream); }
  .btn-social svg { width: 18px; height: 18px; flex-shrink: 0; }

  /* Guest button */
  .btn-guest {
    width: 100%;
    padding: 14px;
    background: transparent;
    border: 1px dashed var(--text-3);
    color: var(--text-2);
    font-family: 'Source Sans 3', serif;
    font-weight: 500;
    font-size: 13px;
    cursor: pointer;
    transition: border-color .2s, color .2s;
  }
  .btn-guest:hover { border-color: var(--warm); color: var(--cream); }

  /* Footer */
  .login-footer {
    margin-top: 40px;
    text-align: center;
    font-size: 13px;
    color: var(--text-3);
    font-family: 'Source Sans 3', serif;
  }
  .login-footer a {
    color: var(--warm);
    text-decoration: none;
    font-weight: 600;
  }
  .login-footer a:hover { text-decoration: underline; }

  /* Decorative editorial lines */
  .deco-lines {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, transparent 0%, var(--warm) 30%, var(--warm) 70%, transparent 100%);
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }
</style>
</head>
<body>

<div class="bg-texture"></div>
<div class="deco-lines"></div>
<div class="concept-label"><strong>E</strong> — Editorial &middot; Login</div>

<div class="login-page">

  <!-- Logo -->
  <div class="logo-block">
    <div class="logo-monogram">
      <div class="logo-letter">M<span>D</span></div>
    </div>
    <div class="app-title">MMA <em>DNA</em></div>
    <div class="app-subtitle">Fight Intelligence</div>
  </div>

  <!-- Form -->
  <form class="login-form" onsubmit="return false">
    <div class="input-group">
      <label>Email Address</label>
      <input type="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="input-group">
      <label>Password</label>
      <input type="password" placeholder="Enter your password" autocomplete="current-password">
    </div>
    <a href="#" class="forgot-link">Forgot password?</a>

    <button class="btn-primary" type="submit">Sign In</button>

    <div class="divider"><span class="divider-text">or continue with</span></div>

    <div class="social-row">
      <button class="btn-social" type="button">
        <svg viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1Z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23Z" fill="#34A853"/><path d="M5.84 14.09A6.68 6.68 0 0 1 5.5 12c0-.72.13-1.43.34-2.09V7.07H2.18A10.96 10.96 0 0 0 1 12c0 1.78.43 3.46 1.18 4.93l3.66-2.84Z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53Z" fill="#EA4335"/></svg>
        Google
      </button>
      <button class="btn-social" type="button">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
        GitHub
      </button>
    </div>

    <button class="btn-guest" type="button">Continue as Guest</button>
  </form>

  <div class="login-footer">
    Don't have an account? <a href="#">Sign up free</a>
  </div>

</div>
</body>
</html>
