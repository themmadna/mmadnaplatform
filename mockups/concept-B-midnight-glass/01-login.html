<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Concept B — Midnight Glass — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-base: #050510;
    --bg-glass: rgba(255,255,255,0.04);
    --bg-glass-hover: rgba(255,255,255,0.07);
    --border-glass: rgba(255,255,255,0.08);
    --border-glass-hover: rgba(255,255,255,0.14);
    --text-primary: #f0f0f5;
    --text-secondary: #8888a0;
    --text-muted: #55556a;
    --accent-1: #818cf8;
    --accent-2: #c084fc;
    --accent-gradient: linear-gradient(135deg, #818cf8, #c084fc);
    --success: #34d399;
    --danger: #fb7185;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  html { font-size: 16px; -webkit-text-size-adjust: 100%; }
  body {
    background: var(--bg-base);
    color: var(--text-primary);
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Ambient gradient orbs */
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(100px);
    opacity: 0.15;
    pointer-events: none;
    z-index: 0;
  }
  body::before {
    width: 350px; height: 350px;
    background: #818cf8;
    top: -80px; right: -60px;
  }
  body::after {
    width: 300px; height: 300px;
    background: #c084fc;
    bottom: -50px; left: -80px;
  }

  .glass {
    background: var(--bg-glass);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--border-glass);
  }

  /* ─── LOGIN CONTAINER ─── */
  .login-wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 400px;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
  }

  /* ─── BRANDING ─── */
  .brand {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    text-align: center;
  }
  .brand-icon {
    width: 64px; height: 64px;
    background: var(--accent-gradient);
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 16px;
    color: #fff;
    box-shadow: 0 8px 32px rgba(129,140,248,0.25);
  }
  .brand-name {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -1px;
    background: linear-gradient(180deg, #fff 30%, var(--text-secondary) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .brand-tagline {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.5;
    max-width: 280px;
  }

  /* ─── LOGIN CARD ─── */
  .login-card {
    width: 100%;
    border-radius: 20px;
    padding: 28px 24px;
  }
  .login-card h2 {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .login-card .subtitle {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 24px;
  }

  /* ─── FORM ─── */
  .form-group {
    margin-bottom: 16px;
  }
  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .form-input {
    width: 100%;
    padding: 14px 16px;
    border-radius: 12px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border-glass);
    color: var(--text-primary);
    font-family: inherit;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  .form-input::placeholder {
    color: var(--text-muted);
  }
  .form-input:focus {
    border-color: var(--accent-1);
    background: rgba(129,140,248,0.04);
  }

  .form-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }
  .remember-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-secondary);
    cursor: pointer;
  }
  .remember-label input[type="checkbox"] {
    appearance: none;
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 5px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border-glass);
    cursor: pointer;
    position: relative;
    flex-shrink: 0;
  }
  .remember-label input[type="checkbox"]:checked {
    background: var(--accent-gradient);
    border-color: transparent;
  }
  .remember-label input[type="checkbox"]:checked::after {
    content: '';
    position: absolute;
    top: 3px; left: 6px;
    width: 5px; height: 9px;
    border: solid #fff;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }
  .forgot-link {
    font-size: 13px;
    color: var(--accent-1);
    text-decoration: none;
    font-weight: 600;
  }

  /* ─── BUTTONS ─── */
  .btn-primary {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 12px;
    background: var(--accent-gradient);
    color: #fff;
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 20px rgba(129,140,248,0.3);
    letter-spacing: -0.2px;
  }
  .btn-primary:active {
    transform: scale(0.98);
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 14px;
    margin: 20px 0;
  }
  .divider-line {
    flex: 1;
    height: 1px;
    background: var(--border-glass);
  }
  .divider-text {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    font-weight: 600;
  }

  .btn-social {
    width: 100%;
    padding: 14px;
    border: 1px solid var(--border-glass);
    border-radius: 12px;
    background: var(--bg-glass);
    color: var(--text-primary);
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .btn-social:active {
    transform: scale(0.98);
    background: var(--bg-glass-hover);
  }
  .btn-social svg {
    width: 20px; height: 20px;
  }

  .btn-guest {
    width: 100%;
    padding: 14px;
    border: 1px dashed rgba(255,255,255,0.12);
    border-radius: 12px;
    background: transparent;
    color: var(--text-secondary);
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-guest:active {
    background: var(--bg-glass);
  }
  .btn-guest svg {
    width: 18px; height: 18px;
    opacity: 0.6;
  }

  /* ─── FOOTER ─── */
  .login-footer {
    text-align: center;
    font-size: 13px;
    color: var(--text-muted);
  }
  .login-footer a {
    color: var(--accent-1);
    text-decoration: none;
    font-weight: 600;
  }

  /* ─── CONCEPT LABEL ─── */
  .concept-label {
    position: fixed;
    top: 16px;
    right: 12px;
    backdrop-filter: blur(16px);
    padding: 8px 14px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
    z-index: 100;
    border: 1px solid var(--border-glass);
    background: rgba(5,5,16,0.8);
  }
  .concept-label strong {
    background: var(--accent-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* ─── DESKTOP ─── */
  @media (min-width: 640px) {
    .login-wrapper { padding: 40px 24px; }
    .brand-icon { width: 72px; height: 72px; font-size: 18px; border-radius: 20px; }
    .brand-name { font-size: 36px; }
    .login-card { padding: 32px 28px; }
  }
</style>
</head>
<body>

<div class="login-wrapper">

  <!-- BRANDING -->
  <div class="brand">
    <div class="brand-icon">DNA</div>
    <div class="brand-name">MMA DNA</div>
    <p class="brand-tagline">Score fights. Track judges. Discover your combat DNA.</p>
  </div>

  <!-- LOGIN CARD -->
  <div class="login-card glass">
    <h2>Welcome back</h2>
    <p class="subtitle">Sign in to access your scorecards and judging profile</p>

    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" class="form-input" placeholder="you@example.com">
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" class="form-input" placeholder="Enter your password">
    </div>

    <div class="form-row">
      <label class="remember-label">
        <input type="checkbox"> Remember me
      </label>
      <a href="#" class="forgot-link">Forgot?</a>
    </div>

    <button class="btn-primary">Sign In</button>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">or continue with</span>
      <div class="divider-line"></div>
    </div>

    <button class="btn-social">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Google
    </button>

    <button class="btn-social">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.87 8.17 6.84 9.5.5.08.66-.23.66-.5v-1.69c-2.77.6-3.36-1.34-3.36-1.34-.46-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.87 1.52 2.34 1.07 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.92 0-1.11.38-2 1.03-2.71-.1-.25-.45-1.29.1-2.64 0 0 .84-.27 2.75 1.02.79-.22 1.65-.33 2.5-.33.85 0 1.71.11 2.5.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.35.2 2.39.1 2.64.65.71 1.03 1.6 1.03 2.71 0 3.82-2.34 4.66-4.57 4.91.36.31.69.92.69 1.85V21.5c0 .27.16.59.67.5C19.14 20.16 22 16.42 22 12A10 10 0 0 0 12 2z"/>
      </svg>
      GitHub
    </button>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">or</span>
      <div class="divider-line"></div>
    </div>

    <button class="btn-guest">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      Continue as Guest
    </button>
  </div>

  <!-- FOOTER -->
  <div class="login-footer">
    Don't have an account? <a href="#">Sign up free</a>
  </div>

</div>

<div class="concept-label">
  <strong>B — Midnight Glass</strong> · Login
</div>

</body>
</html>
